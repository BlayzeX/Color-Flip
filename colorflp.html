<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color flippeer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Color flipper</h1>
        <div class="color-box" id="colorBox">
            <button class="color-btn" id="red">Red</button>
            <button class="color-btn" id="blue">Blue</button>
            <button class="color-btn" id="green">Green</button>
            <button class="color-btn" id="yellow">Yellow</button>
            <button id="flipButton">Flip Color</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
